nt:"REVISÃO VISUAL";position:absolute;bottom:22px;font-size:8px;font-weight:900;letter-spacing:1.2px;color:#2b2130}.core b{font-size:36px;line-height:.85;letter-spacing:-1.5px;max-width:185px}.core .center-emoji{font-size:44px;margin-bottom:8px}.core small{font-size:13px;line-height:1.25;max-width:165px;color:#322a36;margin-top:8px;font-weight:800}.arrows{position:absolute;inset:0;width:100%;height:100%;z-index:1;pointer-events:none}.arrow-path{fill:none;stroke:var(--accent);stroke-width:4.5;stroke-linecap:round;stroke-dasharray:9 7;filter:drop-shadow(1px 1px 0 #fff)}.arrow-head{fill:var(--accent)}.ray{display:none}.cluster{z-index:2}.cluster.a{grid-area:1/1/2/2;transform:rotate(-1deg)}.cluster.b{grid-area:1/3/2/4;transform:rotate(1deg)}.cluster.c{grid-area:2/1/3/2;transform:rotate(1deg)}.cluster.d{grid-area:2/3/3/4;transform:rotate(-1deg)}.node{min-height:167px;border:3px solid var(--accent);border-radius:7px 13px 9px 15px;padding:14px 16px 13px;background:#fffefa;box-shadow:5px 5px 0 color-mix(in srgb,var(--accent),#fff 42%);position:relative;overflow:hidden}.node:before{content:"";position:absolute;width:68px;height:68px;border-radius:50%;right:-23px;top:-23px;background:var(--wash);border:2px solid var(--accent)}.node i{font-style:normal;float:right;font-size:29px;position:relative}.node-kind{display:inline-block;color:#27202b;background:var(--accent);font-family:'Patrick Hand',cursive;font-size:14px;letter-spacing:.4px;font-weight:700;margin-bottom:6px;padding:1px 7px;border-radius:3px;transform:rotate(-1deg)}.node h3{font-family:'Patrick Hand',cursive;font-size:25px;line-height:.95;letter-spacing:.1px;margin:0 34px 8px 0;color:#2b2430}.node p{font-size:16px;line-height:1.32;margin:0;color:#332d38;font-weight:750}.node b{color:var(--label)}.node .mini{display:block;border-top:2px dashed var(--border);margin-top:8px;padding-top:6px;color:var(--label);font-size:12px;font-weight:900}.node .example{display:block;margin-top:8px;background:var(--wash);border-left:5px solid var(--accent);border-radius:2px;padding:6px 8px;font-size:12px;line-height:1.25;color:#2f2c36;font-weight:850}.node .example b{font-family:'Patrick Hand',cursive;font-size:15px;letter-spacing:.3px}.tip{position:absolute;z-index:3;bottom:10px;left:50%;transform:translateX(-50%) rotate(-.5deg);border-radius:4px;background:#fffdf8;border:2px solid var(--accent);color:#403846;text-align:center;font-size:15px;font-weight:800;padding:9px 17px;max-width:82%;box-shadow:4px 4px 0 var(--wash)}.tip:before{content:"🧠 COMO CAI NA PROVA · ";font-family:'Patrick Hand',cursive;font-size:15px;letter-spacing:.6px;font-weight:700;color:var(--label)}.tip b{color:var(--label)}.gold{--accent:#ffba49;--wash:#fff4d7;--border:#ffe0a3;--label:#b57407;--line:#f5d789}.purple{--accent:#9277ff;--wash:#f0ecff;--border:#d8ceff;--label:#7155da;--line:#d8cdfc}.blue{--accent:#48abe0;--wash:#e5f6ff;--border:#bee8ff;--label:#2487ba;--line:#bbe6fa}.green{--accent:#47c58c;--wash:#e2f8ee;--border:#b8e9d2;--label:#19865c;--line:#b8e6d0}

</style></head><body><header class="top"><div class="brand"><span>🧠</span>50 MAPAS MENTAIS · LÍNGUA PORTUGUESA</div><button onclick="window.print()">🖨️ Imprimir todos os 50 mapas</button></header><main class="wrap"><section class="intro"><span>coleção completa para revisão</span><h1>50 mapas. 50 páginas. Um caminho claro para acertar.</h1><p>Cada assunto tem uma página independente, com quatro conexões-chave e uma estratégia de memorização.</p></section><div class="legend"><span>🔎 Interpretação</span><span>⚖️ Sintaxe</span><span>🧩 Morfologia</span><span>🌈 Semântica</span></div><div id="maps"></div></main><script>
const D=[
['gold','🔎','Interpretação','Tema central','🎯','Tema','O assunto geral que organiza o texto.','📍','Tese','A posição defendida pelo autor.','🧱','Argumentos','Razões, dados e exemplos que sustentam a tese.','🧭','Finalidade','Informar, convencer, criticar, emocionar ou instruir.','Pergunte primeiro: <b>sobre o que se fala?</b> Depois: <b>o que se defende?</b>'],
['gold','📌','Interpretação','Informação explícita','🔍','Localização','Está declarada no texto: volte ao trecho.','🧾','Comprovação','A alternativa correta tem amparo literal.','🚫','Extrapolação','Não aceite informação que o texto não fornece.','✅','Palavra-chave','Compare os termos do enunciado com o parágrafo.','<b>Explícito</b> é o que se prova apontando uma passagem.'],
['gold','💭','Interpretação','Inferência','🧩','Pistas','A conclusão nasce de informações presentes.','⚖️','Limite','Inferir não é imaginar ou completar lacunas.','🔗','Relação','Conectivos e escolhas de tom ajudam a inferir.','🎯','Cautela','Prefira a alternativa mais fiel e menos absoluta.','A inferência correta é <b>necessária ou muito provável</b> no contexto.'],
['gold','🗣️','Interpretação','Vozes no texto','👤','Autor','Quem constrói e organiza o ponto de vista.','🎭','Personagem','Pode expressar visão diferente da do autor.','💬','Citação','A fonte citada pode ser usada como argumento.','🔎','Narrador','Observe de onde parte a narração ou comentário.','Sempre identifique <b>quem disse</b> antes de atribuir uma opinião.'],
['gold','🎭','Interpretação','Ironia e humor','↔️','Contraste','Há distância entre o que se diz e o que se quer dizer.','🪞','Duplo sentido','Uma expressão pode permitir leitura literal e crítica.','😏','Tom','Exagero e quebra de expectativa produzem humor.','📌','Contexto','A situação revela se a fala é irônica.','Na ironia, a leitura literal costuma ser a <b>armadilha</b>.'],
['gold','📰','Interpretação','Gêneros textuais','🧾','Notícia','Informa fato; prioriza objetividade e atualidade.','💭','Artigo','Defende opinião com tese e argumentação.','📣','Publicidade','Busca persuadir e valorizar um produto ou ideia.','✉️','Carta / e-mail','Tem interlocutor, finalidade e grau de formalidade.','Gênero = <b>forma + objetivo + situação de circulação</b>.'],
['gold','🔄','Interpretação','Paráfrase','🟰','Equivalência','Reescrever sem mudar o núcleo do sentido.','🧷','Conectivos','A relação lógica deve ser preservada.','🎚️','Modalização','“Talvez” não equivale a “certamente”.','🚫','Cuidado','Troca de palavra parecida pode alterar o tom.','Teste a paráfrase: ela conserva <b>sentido, foco e intensidade</b>?'],
['gold','🧠','Interpretação','Estratégia de prova','1️⃣','Comando','Veja exatamente o que a questão pede.','2️⃣','Trecho','Localize a passagem relevante antes de responder.','3️⃣','Eliminação','Corte exageros, contradições e invenções.','4️⃣','Prova','Escolha a opção demonstrável pelo texto.','Em dúvida, volte ao texto: ele é a <b>única autoridade</b> da questão.'],
['purple','👥','Sintaxe','Sujeito composto','⬅️','Antes do verbo','“João e Ana <b>chegaram</b>”. Plural obrigatório.','➡️','Depois do verbo','Plural ou atração: “Chegou/chegaram João e Ana”.','👤','Pessoas','1ª pessoa prevalece: “Eu e tu <b>iremos</b>”.','➕','Núcleos','Mais de um núcleo normalmente exige plural.','Localize os núcleos do sujeito antes de julgar a concordância.'],
['purple','🥧','Sintaxe','Expressões partitivas','📦','Maioria','“A maioria dos alunos <b>chegou/chegaram</b>”.','🔢','Parte de','“Uma parte dos candidatos...” admite as duas formas.','🎯','Foco','Singular enfatiza o conjunto; plural, os elementos.','⚠️','Porcentagem','Com numeral, atenção ao termo determinado.','Partitivos são casos clássicos de <b>dupla concordância</b>.'],
['purple','🪞','Sintaxe','Índice de indeterminação','🔧','Estrutura','VTI, VI ou VL + <b>se</b>.','1️⃣','Singular','“Precisa-se de funcionários”.','🚫','Sem sujeito','Não há sujeito paciente para concordar.','🔍','Teste','Se exige preposição, tende a ser VTI + se.','Com índice de indeterminação, o verbo fica <b>sempre no singular</b>.'],
['purple','🧱','Sintaxe','Partícula apassivadora','🔧','Estrutura','VTD ou VTDI + <b>se</b>.','👥','Sujeito paciente','“Vendem-se casas”: casas recebe a ação.','➕','Concordância','“Alugam-se apartamentos”.','🔁','Analítica','Equivale a “Casas são vendidas”.','Tente passar para a passiva analítica: se der, há sujeito paciente.'],
['purple','📏','Sintaxe','Concordância nominal','🎨','Adjetivo','Concorda com o substantivo: “medidas <b>claras</b>”.','📎','Anexo','Varia: “seguem <b>anexas</b> as cópias”.','½','Meio','Advérbio é invariável: “meio cansada”; numeral varia.','📚','Bastante','Advérbio é invariável; pronome/adjetivo varia.','Pergunte: a palavra caracteriza um nome ou intensifica algo?'],
['purple','👀','Sintaxe','Regência: assistir','🎬','Ver','Quem assiste <b>a</b> algo: “assistiu ao filme”.','🤝','Auxiliar','Quem assiste alguém presta assistência.','📌','Presenciar','“Assistiu ao acidente” = presenciou.','⚠️','Prova','O sentido define a preposição exigida.','Não decore isolado: associe o verbo ao <b>sentido</b>.'],
['purple','🎯','Sintaxe','Regência: visar','🏆','Objetivar','Visar <b>a</b> um cargo / a um objetivo.','🎯','Mirar','Visar o alvo, sem preposição.','🖊️','Rubricar','Visar o documento, também sem preposição.','🔍','Sentido','Uma palavra, três construções possíveis.','Antes de marcar, substitua o verbo por “objetivar”, “mirar” ou “rubricar”.'],
['purple','🤝','Sintaxe','Regência: preferir','↔️','Estrutura','Prefiro X <b>a</b> Y.','🚫','Intensidade','Evite “prefiro mais” e “prefiro do que”.','🎯','Comparação','O próprio verbo já estabelece preferência.','✅','Exemplo','“Prefiro estudar a sair”.','Em prova, construções populares podem contrariar a norma-padrão.'],
['purple','➕','Sintaxe','Crase: fórmula','🧪','Fusão','Preposição <b>a</b> + artigo <b>a(s)</b> = à(s).','♂️','Teste','Se no masculino vira “ao”, pode haver crase.','⏰','Horas','“Às duas horas”; “daqui a duas horas”.','🚫','Proibida','Antes de verbo, masculino e muitos pronomes.','A crase depende de <b>dois requisitos</b>, não apenas do feminino.'],
['purple','📍','Sintaxe','Crase: lugares','🏙️','Volto da','Quem vai <b>à</b> Bahia, volta da Bahia.','🗺️','Volto de','Quem vai a Roma, volta de Roma: sem crase.','🏠','Casa / terra','Sem especificação, geralmente sem artigo: “a casa”.','🔎','Determinação','Com especificação, pode haver artigo: “à casa dos pais”.','Use o macete: <b>vou a, volto da</b> → há crase.'],
['purple','✂️','Sintaxe','Vírgula: proibições','🚫','Sujeito + verbo','Nunca separe: “Os alunos chegaram”.','🚫','Verbo + objeto','Não separe: “Entreguei o trabalho”.','🚫','Nome + complemento','Não separe o termo de seu complemento essencial.','✅','Uso lógico','Vírgula marca deslocamento, enumeração ou isolamento.','Antes de colocar vírgula, verifique se você está quebrando uma unidade.'],
['purple','🛼','Sintaxe','Vírgula: deslocamentos','📍','Adjunto curto','Vírgula pode ser facultativa: “Hoje(,) estudarei”.','📜','Adjunto longo','Vírgula recomendada: “No final da tarde, ...”.','🔀','Ordem direta','Sujeito + verbo + complementos normalmente não pede pausa.','🎯','Ênfase','O deslocamento destaca uma circunstância.','O tamanho e a posição do adjunto ajudam a decidir a vírgula.'],
['purple','📎','Sintaxe','Aposto e vocativo','📌','Aposto','Explica: “Brasília, <b>capital do Brasil</b>, ...”.','🗣️','Vocativo','Chama o interlocutor: “<b>Maria</b>, venha”.','✂️','Isolamento','Os dois são separados por vírgula.','⚠️','Não confunda','Vocativo não é sujeito da oração.','Se o termo serve para chamar alguém, é <b>vocativo</b>.'],
['blue','🔀','Morfologia','Conjunções causais','🔥','Porque','Introduz causa ou explicação conforme o contexto.','🌤️','Como','No início, frequentemente tem valor causal.','🧾','Já que','Apresenta motivo considerado conhecido.','🔗','Efeito','A segunda oração justifica a primeira.','Não memorize só a palavra: identifique a <b>relação lógica</b>.'],
['blue','🌧️','Morfologia','Conjunções concessivas','🧱','Embora','Contraste que não impede o fato principal.','🌦️','Ainda que','Admite hipótese ou obstáculo.','⚖️','Relação','“Embora estudasse, não passou”.','🚫','Não é causa','Há oposição, não explicação do motivo.','Concessão = obstáculo <b>ineficaz</b> diante do resultado.'],
['blue','⚔️','Morfologia','Conjunções adversativas','🛑','Mas','Oposição entre duas ideias coordenadas.','🔄','Porém','Pode vir deslocado: “Estudou; não passou, porém”.','🧩','Contudo','Mantém sentido adversativo, com posição variável.','✂️','Vírgula','Em geral, é precedida de vírgula.','Adversativa opõe; concessiva subordina uma ideia à outra.'],
['blue','➡️','Morfologia','Conjunções conclusivas','🏁','Logo','Indica conclusão de raciocínio.','💡','Portanto','Conecta premissas a um resultado.','🛤️','Por isso','Expressa consequência.','✂️','Pontuação','Frequentemente aparece isolada por vírgulas.','Conclusão não é “opinião”: é o resultado do que foi dito.'],
['blue','🧲','Morfologia','Próclise','🧲','Atrativos','Não, nunca, que, quem, talvez e pronomes relativos.','✅','Exemplo','“Não <b>me</b> conte”; “quem <b>lhe</b> falou?”.','❓','Interrogativa','“Quem <b>te</b> chamou?”','🔗','Subordinação','Conjunção subordinativa também atrai pronome.','A próclise acontece quando existe uma <b>palavra atrativa</b>.'],
['blue','➡️','Morfologia','Ênclise','📝','Início formal','“Diga-<b>me</b> a verdade”.','🔧','Imperativo','“Ajude-<b>me</b> agora”.','🚫','Atrativo','Com palavra atrativa, a ênclise cede lugar à próclise.','⚠️','Uso real','A fala brasileira aceita outras posições; prova cobra norma.','Sem atrator, a posição depois do verbo é a escolha segura.'],

['blue','❓','Morfologia','Funções do “que”','🔗','Relativo','Retoma antecedente: “o livro <b>que</b> li”.','🧩','Conjunção','Integra oração: “disse <b>que</b> viria”.','❔','Interrogativo','“<b>Que</b> livro você leu?”','✨','Expletivo','Pode ser de realce: “Quase <b>que</b> caí”.','Veja se “que” retoma termo anterior: se sim, tende a ser relativo.'],
['blue','🪞','Morfologia','Funções do “se”','🙋','Reflexivo','“Ela <b>se</b> feriu”: ação volta ao sujeito.','🧱','Apassivador','“Vendem-<b>se</b> casas”: há sujeito paciente.','❔','Indeterminador','“Precisa-<b>se</b> de ajuda”: verbo singular.','🔀','Conjunção','“<b>Se</b> chover, ficaremos”.','O “se” só se revela quando você analisa a <b>estrutura inteira</b>.'],

        .fullscreen-map-controls{display:none}.map:fullscreen .fullscreen-map-controls,.map:-webkit-full-screen .fullscreen-map-controls{display:flex;position:absolute;z-index:20;right:18px;top:16px;gap:8px}.fullscreen-map-controls button{border:0;border-radius:8px;background:#332638;color:#fff;font:800 16px Nunito,Arial,sans-serif;padding:9px 12px;cursor:pointer;box-shadow:0 3px 10px #0003}.fullscreen-map-controls button:hover{background:#56465a}
        @media(max-width:760px){
          body{overflow-x:hidden}.top{height:auto;min-height:58px;padding:8px 12px;gap:8px}.brand{font-size:11px;line-height:1.15;min-width:0}.brand span{font-size:17px;margin-right:3px}.top>button{display:none}.wrap{padding:16px 12px 36px}.intro h1{font-size:clamp(34px,12vw,48px)}.intro p{font-size:14px}.legend span{font-size:15px;padding:5px 9px}.map{margin:16px 0}.head{gap:10px}.title{gap:9px;min-width:0}.ico{width:45px;height:43px;flex:none;font-size:25px;box-shadow:3px 3px 0 color-mix(in srgb,var(--accent),#27202b 34%)}.title small{font-size:9px;letter-spacing:.7px}.title h2{font-size:30px;line-height:.9;overflow-wrap:anywhere}.canvas{gap:16px;padding:18px 12px 20px}.core{width:160px;height:160px}.core b{font-size:30px}.core .center-emoji{font-size:35px}.node{padding:12px 13px}.node h3{font-size:23px}.node p{font-size:15px}.tip{font-size:13px;padding:8px 10px}.tip:before{font-size:13px}
          .map:fullscreen,.map:-webkit-full-screen{width:100vw;height:100dvh;overflow-y:auto}.map:fullscreen .canvas,.map:-webkit-full-screen .canvas{height:auto;min-height:calc(100dvh - 72px)}.map:fullscreen .head,.map:-webkit-full-screen .head{position:sticky;top:0;background:#fffdf8}.map:fullscreen .tip,.map:-webkit-full-screen .tip{margin-bottom:12px}
          .map:fullscreen .fullscreen-map-controls,.map:-webkit-full-screen .fullscreen-map-controls{right:8px;top:8px;gap:5px}.fullscreen-map-controls button{font-size:0;padding:8px 10px}.fullscreen-map-controls button[data-action="previous"]:after{content:"←";font-size:19px}.fullscreen-map-controls button[data-action="next"]:after{content:"→";font-size:19px}.fullscreen-map-controls button[data-action="exit"]:after{content:"×";font-size:22px}
        }`;
      document.head.append(fullscreenStyle);
      const fullscreenControls=document.createElement('div');
      fullscreenControls.className='fullscreen-map-controls';
      fullscreenControls.innerHTML='<button type="button" data-action="previous" aria-label="Mapa anterior" title="Mapa anterior">← Voltar</button><button type="button" data-action="next" aria-label="Próximo mapa" title="Próximo mapa">Passar →</button><button type="button" data-action="exit" aria-label="Sair da tela cheia" title="Sair da tela cheia">Sair ⛶</button>';
      const maps=()=>[...document.querySelectorAll('.map')];
      const openMapFullscreen=async map=>{
        fullscreenControls.remove();
        map.append(fullscreenControls);
        await map.requestFullscreen();
      };
      fullscreenControls.addEventListener('click',async event=>{
        const action=event.target.closest('button')?.dataset.action;
        if(action==='exit'){await document.exitFullscreen();return}
        const current=document.fullscreenElement;
        const index=maps().indexOf(current);
        const target=maps()[action==='next'?Math.min(index+1,maps().length-1):Math.max(index-1,0)];
        if(target!==current)await openMapFullscreen(target);
      });
      controls.addEventListener('click',async event=>{
        const button=event.target.closest('[data-action="fullscreen"]');
        if(!button)return;
        event.stopImmediatePropagation();
        if(document.fullscreenElement){await document.exitFullscreen();return}
        const activeMap=getActiveMap();
        await openMapFullscreen(activeMap);
      },true);
    }
  });
