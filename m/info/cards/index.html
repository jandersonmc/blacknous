<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards Concursos - Informática</title>
    <meta name="description" content="50 Flashcards de Informática para Concursos Públicos. Estude de forma interativa e bonita.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-animation">
        <div class="bg-orb"></div>
        <div class="bg-orb"></div>
        <div class="bg-orb"></div>
        <div class="bg-orb"></div>
    </div>

    <header class="header">
        <div class="header-content">
            <div class="header-badge">
                <div class="pulse-dot"></div>
                Focado em Concursos Públicos
            </div>
            
            <button class="music-toggle" id="music-toggle" title="Ligar/Desligar Música">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                    <line x1="23" y1="9" x2="17" y2="15"></line>
                    <line x1="17" y1="9" x2="23" y2="15"></line>
                </svg>
                Música: OFF
            </button>
            <audio id="bg-music" loop>
                <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
            </audio>

            <h1>Flashcards de Informática</h1>
            <p>Os 50 tópicos que mais caem em provas de concursos públicos. Clique nos cards para virá-los e ver os detalhes de cada assunto.</p>
        </div>
    </header>

    <div class="cards-container">
        <div class="carousel-navigation">
            <button class="nav-btn" id="prev-btn" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                Anterior
            </button>
            <div class="card-counter" id="card-counter">
                <span id="current-index">0</span> / <span id="total-filtered">0</span>
            </div>
            <button class="nav-btn" id="next-btn" disabled>
                Próximo
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </button>
        </div>

        <div class="cards-grid carousel-view" id="cards-grid">
            <!-- Os Flashcards serão gerados dinamicamente via JS -->
        </div>
    </div>

    <div class="progress-container">
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progress-bar" style="width: 0%"></div>
        </div>
        <div class="progress-text" id="progress-text">0% concluído</div>
    </div>

    <div class="category-filters" id="category-filters">
        <button class="cat-pill active" data-category="all">Todos</button>
        <!-- Filtros de categoria serão gerados dinamicamente via JS -->
    </div>

    <div class="controls">
        <button class="control-btn shuffle-btn" id="shuffle-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line><line x1="4" y1="4" x2="9" y2="9"></line></svg>
            Embaralhar Flashcards
        </button>
        <button class="control-btn" id="reset-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><polyline points="3 3 3 8 8 8"></polyline></svg>
            Zerar Progresso
        </button>
    </div>

    <div class="stats-bar">
        <div class="stat-item">
            <span>Total:</span>
            <span class="stat-number" id="total-cards">50</span>
        </div>
        <div class="stat-item">
            <span>Estudados:</span>
            <span class="stat-number" id="studied-cards">0</span>
        </div>
    </div>

    <footer class="footer">
        <p>Desenvolvido para concurseiros. Sucesso na prova!</p>
    </footer>

    <!-- Scripts -->
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
