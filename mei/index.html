<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="keywords" content="contabilidade, MEI, ME, EPP, Simples Nacional, folha de pagamento, fiscal, contábil">
  <meta property="og:image" content="https://raw.githubusercontent.com/jandersonmelo/blacknous/refs/heads/main/mei/share.png">

  <title>Blacknous | O manual secreto do MEI</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0d;
      --text: #e0e0e0;
      --accent: #0072ff;
      --card: #1a1a1a;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background-color: var(--bg);
      color: var(--text);
    }
    .video-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 0;
    }
    .video-container h1 {
      color: #ffffff;
      font-size: 1.5rem;
      margin-bottom: 1rem;
      margin-top: 1;
      text-align: center;
    }
    .video-frame {
      position: relative;
      width: 90%;
      max-width: 800px;
      aspect-ratio: 15.7 / 9;
      background-color: var(--bg);
      /* border: 4px solid;
      border-image: linear-gradient(to right, #00c6ff, #0072ff) 1; */
      overflow: hidden;
    }
    .video-frame iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    footer {
      text-align: center;
      padding: 1rem;
      background-color: var(--card);
      font-size: 0.9rem;
      position: fixed;
      bottom: 0;
      width: 100%;
    }
    footer p {
      margin: 0.3rem 0;
    }

    /*botão em baixo vídeo*/
    #botao-container {
      text-align: center;
      margin-top: 2rem;
    }

    .botao-contactar {
      display: inline-block;
      padding: 1.5rem 3rem;
      font-size: 1.4rem;
      font-weight: bold;
      color: #fff;
      background-image: linear-gradient(to right, #00c6ff, #0072ff);
      border: none;
      border-radius: 10px;
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.3s;
      margin: 2rem auto;
    }
    .botao-contactar:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="video-container">
    <h1>O manual secreto do MEI: Tudo que você precisa saber sobre o MEI</h1>
    <div class="video-frame">
      <iframe src="https://www.youtube.com/embed/qJb3aX5CgM8" allow="encrypted-media" allowfullscreen aria-label="Vídeo institucional da Blacknous"></iframe>
    </div>
    <!-- Botão abaixo do vídeo -->
    <div id="botao-container"></div>
  </div>
  <!--
  <footer>
    <p>&copy; <span id="ano-atual"></span> Blacknous Assessoria Contábil</p>
    <p>CRC/PA nº 023305/O</p>
  </footer>
  -->
  <script>
    setTimeout(function() {
      const container = document.getElementById('botao-container');
      const botao = document.createElement('a');
      botao.href = 'https://wa.me/5591984938236?text=Ol%C3%A1,%20quero%20saber%20mais%20sobre%20sua%20consultoria%20para%20MEI%20e%20gostaria%20de%20receber%20meu%20ebook!';
      botao.target = '_blank';
      botao.className = 'botao-contactar';
      botao.textContent = 'Contactar Agora';
      container.appendChild(botao);
    }, 900000);
    document.getElementById('ano-atual').textContent = new Date().getFullYear();
  </script>
</body>
</html>
