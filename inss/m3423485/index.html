<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área de Membros</title>
    <meta name="description" content="Área de membros exclusiva com materiais e bônus.">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="banner">
        <div class="banner-content">
            <img src="banner.webp" alt="Banner Área de Membros" class="banner-image">
        </div>
    </header>

    <main class="content-area">
        <div class="timeline">
            <!-- Linha da Timeline -->
            <div class="timeline-line"></div>

            <!-- Módulo 1 -->
            <div class="timeline-item">
                <div class="timeline-dot"></div>
                <div class="timeline-content module-card">
                    <div class="module-header">
                        <i class="fa-solid fa-map"></i>
                        <h2>Mapas Garabita INSS</h2>
                    </div>
                    <ul class="resource-list">
                        <li>
                            <a href="https://drive.google.com/file/d/1AVUZsBjKkmQg_gBE3X2MOnn5AjJ41FB-/view?usp=drive_link" target="_blank" class="resource-link">
                                <i class="fa-brands fa-google-drive"></i>
                                <span>Mapa 1</span>
                                <i class="fa-solid fa-arrow-up-right-from-square external-icon"></i>
                            </a>
                        </li>
                        <li>
                            <a href="https://drive.google.com/file/d/1UlrjKkKPO_T_oNhybbRT2QWkVv0NqYJy/view?usp=drive_link" target="_blank" class="resource-link">
                                <i class="fa-brands fa-google-drive"></i>
                                <span>Mapa 2</span>
                                <i class="fa-solid fa-arrow-up-right-from-square external-icon"></i>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>

            <!-- Módulo 2 -->
            <div class="timeline-item">
                <div class="timeline-dot"></div>
                <div class="timeline-content module-card">
                    <div class="module-header">
                        <i class="fa-solid fa-gift"></i>
                        <h2>Bônus</h2>
                    </div>
                    <ul class="resource-list">
                        <li>
                            <a href="https://www.blacknous.com/m/info/50q" target="_blank" class="resource-link">
                                <i class="fa-solid fa-list-check"></i>
                                <span>Bônus 1 - 50 questões</span>
                                <i class="fa-solid fa-arrow-up-right-from-square external-icon"></i>
                            </a>
                        </li>
                        <li>
                            <a href="https://www.blacknous.com/m/info/res" target="_blank" class="resource-link">
                                <i class="fa-solid fa-file-lines"></i>
                                <span>Bônus 2 - Resumo</span>
                                <i class="fa-solid fa-arrow-up-right-from-square external-icon"></i>
                            </a>
                        </li>
                        <li>
                            <a href="https://www.blacknous.com/m/info/quizz" target="_blank" class="resource-link">
                                <i class="fa-solid fa-clipboard-question"></i>
                                <span>Bônus 3 - Quizz</span>
                                <i class="fa-solid fa-arrow-up-right-from-square external-icon"></i>
                            </a>
                        </li>
                        <li>
                            <a href="https://www.blacknous.com/m/info/cards" target="_blank" class="resource-link">
                                <i class="fa-solid fa-layer-group"></i>
                                <span>Bônus 4 - Flashcards</span>
                                <i class="fa-solid fa-arrow-up-right-from-square external-icon"></i>
                            </a>
                        </li>
                        <li>
                            <a href="https://www.blacknous.com/m/info/dic" target="_blank" class="resource-link">
                                <i class="fa-solid fa-book"></i>
                                <span>Bônus 5 - Dicionário</span>
                                <i class="fa-solid fa-arrow-up-right-from-square external-icon"></i>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>

        </div>
    </main>

    <footer>
        <p>Feito com ❤️ Blacknous</p>
    </footer>
</body>
</html>
