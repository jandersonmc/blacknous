<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blacknous Contabilidade Digital | Links</title>

    <!-- Meta tags SEO -->
    <meta name="description"
        content="Gestão inteligente e estruturada para sua empresa. Acesse nossos canais de atendimento e redes sociais.">
    <meta name="theme-color" content="#07080a">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

<body>

    <!-- Animated Background Orbs -->
    <div class="bg-orbs" aria-hidden="true">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- Main Container -->
    <main class="container">

        <!-- Profile Section -->
        <header class="profile">
            <div class="profile-img-wrapper" id="profile-picture">

        </header>

        <!-- Links Section -->
        <nav class="links-wrapper" aria-label="Links Sociais e Contato">

            <a href="https://wa.me/5591984938236" class="link-item" target="_blank" rel="noopener noreferrer"
                id="link-whatsapp">
                <div class="link-icon-wrapper">
                    <i class="fa-brands fa-whatsapp icon-whatsapp"></i>
                </div>
                <span class="link-text">Contato via WhatsApp</span>

            <a href="https://www.youtube.com/@blacknousc" class="link-item" target="_blank" rel="noopener noreferrer"

                </div>
                <span class="link-text">Canal no YouTube</span>
                <i class="fa-solid fa-chevron-right link-arrow"></i>
            </a>

            <a href="https://instagram.com/blacknousc" class="link-item" target="_blank" rel="noopener noreferrer"
                id="link-instagram">
                <div class="link-icon-wrapper">
                    <i class="fa-brands fa-instagram icon-instagram"></i>
                </div>
                <span class="link-text">Instagram</span>
                <i class="fa-solid fa-chevron-right link-arrow"></i>
            </a>

        </nav>

        <!-- Footer Section -->
        <footer>
            <p>Blacknous Assessoria Contábil Ltda &copy; <span id="year"></span></p>
        </footer>

    </main>

    <!-- JavaScript para Footer dinâmico -->
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>

</html>
