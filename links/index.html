  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow-x: hidden; /* 🔒 Impede rolagem lateral */
      font-family: 'Inter', Arial, sans-serif;
      background: linear-gradient(135deg, #020b14, #0a1a2a);
      color: #fff;
      animation: fadeIn 0.2s ease-in;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    body {
      display: flex;
      flex-direction: column;
    }
    .container {
      max-width: 400px;
      width: 100%;
      margin: auto;
      padding: 20px;
      box-sizing: border-box;
      flex: 1;
    }
    .profile {
      text-align: center;
      padding: 20px;
    }
    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(255, 255, 255, 0.3);
      background-color: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(5px);
    }
    h1 {
      margin: 10px 0 5px;
      font-size: 1.6em;
    }
    p {
      font-size: 0.95em;
      color: #d0d0d0;
    }
    .links {
      margin-top: 20px;
    }
    .link-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: background 0.3s, transform 0.2s;
      border: 1px solid rgba(255, 255, 255, 0.15);
      text-decoration: none;
      color: white;
      box-sizing: border-box;
    }
    .link-item:hover {
      background: rgba(255, 255, 255, 0.18);
      transform: translateY(-2px);
    }
    .arrow {
      color: #fff;
      font-size: 1.2em;
    }
    footer {
      width: 100%;
      text-align: center;
      padding: 15px 10px;
      font-size: 0.85em;
      color: #ccc;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(5px);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
    footer .cnpj {
      margin-top: 5px;
      font-size: 0.8em;
    }
    @media (max-width: 480px) {
      .container {
        padding: 10px;
      }
      .link-item {
        font-size: 0.9em;
        padding: 10px;
      }
    }
